<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRIMIX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:        #9B1C2E;
      --red-bright: #C0392B;
      --dark:       #0A0A0C;
      --text:       #E8E9EC;
      --text-dim:   #232430;
      --font-mono:  'JetBrains Mono', monospace;
      --font-mark:  'Orbitron', sans-serif;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--dark);
      color: var(--text);
      cursor: none;
      user-select: none;
    }

    /* ── NOISE ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 1000; opacity: .25;
    }

    /* ── SCANLINES ── */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,.016) 2px, rgba(0,0,0,.016) 4px
      );
      pointer-events: none; z-index: 999;
    }

    /* ── BG MESH ── */
    .bg-mesh {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 55% 45% at 14% 14%, rgba(155,28,46,.08) 0%, transparent 62%),
        radial-gradient(ellipse 42% 56% at 86% 86%, rgba(155,28,46,.05) 0%, transparent 62%),
        radial-gradient(ellipse 90% 75% at 50% 50%, rgba(14,14,22,.7) 0%, transparent 100%);
      pointer-events: none;
    }

    /* ── TACTICAL GRID ── */
    .grid-layer {
      position: fixed; inset: -20%; z-index: 2;
      pointer-events: none;
      opacity: .028;
      background-image:
        linear-gradient(rgba(155,28,46,.9) 1px, transparent 1px),
        linear-gradient(90deg, rgba(155,28,46,.9) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridDrift 35s linear infinite;
    }

    @keyframes gridDrift {
      0%   { transform: translate(0, 0); }
      25%  { transform: translate(30px, 20px); }
      50%  { transform: translate(60px, 0px); }
      75%  { transform: translate(30px, -20px); }
      100% { transform: translate(0, 0); }
    }

    /* ── PULSE RINGS ── */
    .pulse-ring {
      position: fixed; top: 50%; left: 50%;
      width: 1px; height: 1px; margin: 0;
      border-radius: 50%;
      border: 1px solid rgba(155,28,46,.045);
      animation: pulseExpand 10s ease-out infinite;
      pointer-events: none; z-index: 1;
    }
    .pulse-ring:nth-child(2) { animation-delay: 3.3s; }
    .pulse-ring:nth-child(3) { animation-delay: 6.6s; }

    @keyframes pulseExpand {
      0%   { width:1px; height:1px; margin:0; opacity:.4; }
      100% { width:150vmax; height:150vmax; margin:-75vmax; opacity:0; }
    }

    /* ── STAGE ── */
    .stage {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }

    /* ── WORDMARK OUTER ── */
    .wordmark-outer {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── SHARED FONT BASE ── */
    .wm-base {
      font-family: var(--font-mark);
      font-weight: 900;
      font-size: clamp(4rem, 11vw, 11rem);
      letter-spacing: .22em;
      text-transform: uppercase;
      line-height: 1;
      display: flex;
    }

    /* ── MAIN WORD ── */
    #mainWord {
      color: var(--text);
      position: relative;
      z-index: 2;
    }

    .wl {
      display: inline-block;
      opacity: 0;
      position: relative;
    }

    /* ── GHOST WORD ── */
    #ghostWord {
      color: var(--red);
      position: absolute;
      top: 0; left: 0;
      z-index: 4;
      pointer-events: none;
      display: flex;
    }

    .gl {
      display: inline-block;
      opacity: 0;
      position: relative;
      transform: translateY(-28px);
      /* glow added via JS after fade-in */
    }

    /* ── GLITCH LAYERS ── */
    .wordmark-glitch {
      font-family: var(--font-mark);
      font-weight: 900;
      font-size: clamp(4rem, 11vw, 11rem);
      letter-spacing: .22em;
      text-transform: uppercase;
      line-height: 1;
      position: absolute;
      top: 0; left: 0;
      opacity: 0;
      z-index: 5;
      pointer-events: none;
      white-space: nowrap;
    }
    #gRed   { color: var(--red-bright); }
    #gWhite { color: #ffffff; }

    /* ── SUBTEXT ── */
    .subtext {
      font-family: var(--font-mono);
      font-size: clamp(.46rem, .75vw, .6rem);
      font-weight: 300;
      letter-spacing: .55em;
      text-transform: uppercase;
      color: var(--text-dim);
      opacity: 0;
      margin-top: 1.8rem;
      transition: opacity 1.6s ease;
      position: relative; z-index: 10;
    }
    .subtext.visible { opacity: 1; }

    /* ── COPYRIGHT ── */
    .copyright {
      position: fixed; bottom: 1.8rem; left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-mono);
      font-size: .46rem; letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--text-dim);
      opacity: 0;
      transition: opacity 1.6s ease .5s;
      z-index: 10; white-space: nowrap;
    }
    .copyright.visible { opacity: 1; }

    /* ── GLITCH KEYFRAMES ── */
    @keyframes sliceRed {
      0%   { opacity:0;    clip-path:inset(0 0 100% 0); transform:translateX(0px)  translateY(0px); }
      6%   { opacity:1;    clip-path:inset(6%  0 74% 0); transform:translateX(-10px) translateY(-4px); }
      18%  {               clip-path:inset(24% 0 52% 0); transform:translateX(8px)   translateY(3px); }
      30%  {               clip-path:inset(52% 0 24% 0); transform:translateX(-7px)  translateY(5px); }
      42%  {               clip-path:inset(72% 0 6%  0); transform:translateX(9px)   translateY(-3px); }
      54%  {               clip-path:inset(36% 0 40% 0); transform:translateX(-5px)  translateY(4px); }
      66%  {               clip-path:inset(14% 0 62% 0); transform:translateX(6px)   translateY(-5px); }
      78%  { opacity:.5;   clip-path:inset(60% 0 16% 0); transform:translateX(-4px)  translateY(2px); }
      90%  { opacity:.2;   clip-path:inset(42% 0 32% 0); transform:translateX(2px); }
      100% { opacity:0;    clip-path:inset(0 0 100% 0);  transform:translateX(0px); }
    }

    @keyframes sliceWhite {
      0%   { opacity:0;    clip-path:inset(0 0 100% 0); transform:translateX(0px)  translateY(0px); }
      6%   { opacity:.75;  clip-path:inset(74% 0 6%  0); transform:translateX(9px)   translateY(4px); }
      18%  {               clip-path:inset(52% 0 24% 0); transform:translateX(-7px)  translateY(-3px); }
      30%  {               clip-path:inset(24% 0 52% 0); transform:translateX(6px)   translateY(-5px); }
      42%  {               clip-path:inset(6%  0 72% 0); transform:translateX(-9px)  translateY(3px); }
      54%  {               clip-path:inset(40% 0 36% 0); transform:translateX(5px)   translateY(-4px); }
      66%  {               clip-path:inset(62% 0 14% 0); transform:translateX(-6px)  translateY(5px); }
      78%  { opacity:.4;   clip-path:inset(16% 0 60% 0); transform:translateX(4px)   translateY(-2px); }
      90%  { opacity:.15;  clip-path:inset(32% 0 42% 0); transform:translateX(-2px); }
      100% { opacity:0;    clip-path:inset(0 0 100% 0);  transform:translateX(0px); }
    }

    @keyframes letterShiftUp {
      0%,100% { transform: translateY(0); }
      15%     { transform: translateY(-6px); }
      35%     { transform: translateY(5px); }
      55%     { transform: translateY(-4px); }
      75%     { transform: translateY(6px); }
      90%     { transform: translateY(-1px); }
    }

    .glitching #gRed {
      animation: sliceRed .6s steps(1) forwards;
      opacity: 1;
    }
    .glitching #gWhite {
      animation: sliceWhite .6s steps(1) forwards;
      opacity: 1;
    }
    .glitching .wl {
      animation: letterShiftUp .6s ease forwards;
    }
    .glitching .wl:nth-child(1) { animation-delay: .00s; }
    .glitching .wl:nth-child(2) { animation-delay: .05s; }
    .glitching .wl:nth-child(3) { animation-delay: .09s; }
    .glitching .wl:nth-child(4) { animation-delay: .03s; }
    .glitching .wl:nth-child(5) { animation-delay: .07s; }
    .glitching .wl:nth-child(6) { animation-delay: .04s; }

    /* ── POPUP ── */
    .popup-overlay {
      position: fixed; inset: 0; z-index: 600;
      display: flex; align-items: center; justify-content: center;
      background: rgba(10,10,12,.92);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      opacity: 0; pointer-events: none;
      transition: opacity .65s ease;
    }
    .popup-overlay.open { opacity: 1; pointer-events: all; }

    .popup-box {
      position: relative;
      background: rgba(255,255,255,.025);
      border: 1px solid rgba(255,255,255,.07);
      padding: 3.4rem 4.4rem 3.2rem;
      min-width: 340px;
      display: flex; flex-direction: column;
      align-items: center; gap: 1.9rem;
      transform: translateY(10px);
      transition: transform .7s cubic-bezier(.16,1,.3,1);
    }
    .popup-overlay.open .popup-box { transform: translateY(0); }

    .popup-box::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--red), transparent);
    }

    .popup-label {
      font-family: var(--font-mono);
      font-size: .54rem; letter-spacing: .4em;
      text-transform: uppercase; color: var(--red-bright);
    }

    .popup-divider { width: 36px; height: 1px; background: rgba(255,255,255,.07); }

    .popup-item { display: flex; flex-direction: column; align-items: center; gap: .35rem; }

    .popup-type {
      font-family: var(--font-mono);
      font-size: .48rem; letter-spacing: .24em;
      text-transform: uppercase; color: #383945;
    }

    .popup-value {
      font-family: var(--font-mono);
      font-size: .82rem; letter-spacing: .07em; color: var(--text);
    }

    .popup-close {
      position: absolute; top: .9rem; right: 1.1rem;
      font-family: var(--font-mono);
      font-size: .52rem; letter-spacing: .18em;
      color: #383945; background: none; border: none;
      cursor: pointer; transition: color .2s;
    }
    .popup-close:hover { color: #9A9BA8; }
  </style>
</head>
<body>

  <div class="bg-mesh"></div>
  <div class="grid-layer"></div>
  <div class="pulse-ring"></div>
  <div class="pulse-ring"></div>
  <div class="pulse-ring"></div>

  <div class="stage">
    <div class="wordmark-outer" id="wordmarkOuter">

      <!-- Glitch layers -->
      <div class="wordmark-glitch" id="gRed">GRIMIX</div>
      <div class="wordmark-glitch" id="gWhite">GRIMIX</div>

      <!-- Ghost — z4, in front -->
      <div class="wm-base" id="ghostWord">
        <span class="gl" id="gl0">G</span>
        <span class="gl" id="gl1">R</span>
        <span class="gl" id="gl2">I</span>
        <span class="gl" id="gl3">M</span>
        <span class="gl" id="gl4">I</span>
        <span class="gl" id="gl5">X</span>
      </div>

      <!-- Main word — z2 -->
      <div class="wm-base" id="mainWord">
        <span class="wl" id="wl0">G</span>
        <span class="wl" id="wl1">R</span>
        <span class="wl" id="wl2">I</span>
        <span class="wl" id="wl3">M</span>
        <span class="wl" id="wl4">I</span>
        <span class="wl" id="wl5">X</span>
      </div>

    </div>

    <div class="subtext" id="subtext">cybersecurity</div>
  </div>

  <div class="copyright" id="copyright">© 2026 GRIMIX</div>

  <!-- POPUP -->
  <div class="popup-overlay" id="popup">
    <div class="popup-box">
      <button class="popup-close" id="closeBtn">[ close ]</button>
      <div class="popup-label">Grimix</div>
      <div class="popup-divider"></div>
      <div class="popup-item">
        <div class="popup-type">email</div>
        <div class="popup-value">grimix.billing@proton.me</div>
      </div>
      <div class="popup-item">
        <div class="popup-type">phone</div>
        <div class="popup-value">+1 (615) 339-3006</div>
      </div>
    </div>
  </div>

  <script>
    const INIT_SILENCE  = 600;   // silence before anything
    const LETTER_STEP   = 130;   // ms between each main letter — slower, more dramatic
    const GHOST_OFFSET  = 200;   // ms after main letter that ghost starts falling
    const GHOST_DRIFT   = 1200;  // ms for ghost to drift down — slow, elegant

    const mainIds  = ['wl0','wl1','wl2','wl3','wl4','wl5'];
    const ghostIds = ['gl0','gl1','gl2','gl3','gl4','gl5'];

    // Lock timing: last ghost letter start + drift duration + settle
    const lastGhostStart = INIT_SILENCE + (ghostIds.length - 1) * LETTER_STEP + GHOST_OFFSET;
    const lockTime       = lastGhostStart + GHOST_DRIFT + 150;

    // ── MAIN LETTERS ──
    mainIds.forEach((id, i) => {
      setTimeout(() => {
        const el = document.getElementById(id);
        el.style.transition = 'opacity .28s ease';
        el.style.opacity = '1';
      }, INIT_SILENCE + i * LETTER_STEP);
    });

    // ── GHOST LETTERS — fall in with red glow ──
    ghostIds.forEach((id, i) => {
      const t = INIT_SILENCE + i * LETTER_STEP + GHOST_OFFSET;
      setTimeout(() => {
        const el = document.getElementById(id);
        el.style.transition = `opacity .3s ease, transform ${GHOST_DRIFT}ms cubic-bezier(.2,.05,.1,1), text-shadow .3s ease`;
        el.style.opacity     = '0.45';
        el.style.transform   = 'translateY(0)';
        el.style.textShadow  = '0 0 22px rgba(155,28,46,.7), 0 0 8px rgba(192,57,43,.5)';
      }, t);
    });

    // ── LOCK IMPACT ──
    setTimeout(lockImpact, lockTime);

    function lockImpact() {
      const main  = document.getElementById('mainWord');
      const ghost = document.getElementById('ghostWord');

      // Ghost glow flares on impact
      Array.from(ghost.children).forEach(el => {
        el.style.textShadow = '0 0 40px rgba(155,28,46,1), 0 0 16px rgba(192,57,43,.9)';
      });

      // Chromatic flash on main
      main.style.textShadow = '4px 0 0 rgba(192,57,43,.7), -4px 0 0 rgba(232,233,236,.3)';

      setTimeout(() => {
        main.style.textShadow = '';

        // Ghost snaps off
        ghost.style.transition = 'opacity .08s ease';
        ghost.style.opacity    = '0';

        // Subtext + copyright appear
        document.getElementById('subtext').classList.add('visible');
        document.getElementById('copyright').classList.add('visible');

        // Glow breath on main
        startBreathing(main);

        // Schedule glitch
        scheduleGlitch();
      }, 90);
    }

    // ── GLOW BREATH ──
    function startBreathing(el) {
      let val = 0, dir = 1;
      setInterval(() => {
        val += dir * 0.004;
        if (val >= 1) { val = 1; dir = -1; }
        if (val <= 0) { val = 0; dir =  1; }
        const a = (val * 0.14).toFixed(3);
        const b = (val * 22).toFixed(1);
        el.style.textShadow = `0 0 ${b}px rgba(232,233,236,${a})`;
      }, 40);
    }

    // ── CINEMATIC GLITCH ──
    function scheduleGlitch() {
      const delay = 10000 + Math.random() * 5000; // 10-15s
      setTimeout(() => { fireGlitch(); scheduleGlitch(); }, delay);
    }

    function fireGlitch() {
      const outer = document.getElementById('wordmarkOuter');
      outer.classList.add('glitching');
      setTimeout(() => outer.classList.remove('glitching'), 620);
    }

    // ── PASSPHRASE ──
    const PHRASE   = 'whenitsgrimoutsidethedarkrunsdeep';
    let   buffer   = '';
    let   unlocked = false;

    document.addEventListener('keydown', e => {
      if (unlocked) return;
      if (e.key === 'Escape') { buffer = ''; return; }
      if (e.key.length === 1) {
        buffer += e.key.toLowerCase();
        if (buffer.length > PHRASE.length)
          buffer = buffer.slice(buffer.length - PHRASE.length);
        if (buffer === PHRASE) openPopup();
      }
    });

    function openPopup() {
      unlocked = true;
      buffer   = '';
      document.getElementById('popup').classList.add('open');
      document.body.style.cursor = 'default';
    }

    function closePopup() {
      unlocked = false;
      document.getElementById('popup').classList.remove('open');
      document.body.style.cursor = 'none';
    }

    document.getElementById
